syntax = "proto3";

enum Color {
    Red = 0;
    Green = 1;
    Yellow = 2;
    Blue = 3;
}

message Address {
    int32 num = 1;
    bytes addr = 2;
}

message Person {
    int32 id = 1;
    repeated bytes name = 2;
    bytes sex = 3;
    int32 age = 4;
    Address addr = 5;
    Color color = 6;
}